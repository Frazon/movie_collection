<div class="container">

  <h1>Minha Coleção</h1>

  <div class="movies">

    <div
      class="movie-card"
      *ngFor="let movie of movies"
    >

      <img
        *ngIf="movie.posterUrl"
        [src]="movie.posterUrl"
        [alt]="movie.title"
      >

      <h2>{{ movie.title }}</h2>

      <p>{{ movie.releaseDate }}</p>

      <button (click)="deleteMovie(movie.id)">
        Remover
      </button>

    </div>

  </div>

</div>
