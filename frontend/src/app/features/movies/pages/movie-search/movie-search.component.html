<div class="container">

  <h1>Coleção de Filmes</h1>

  <div class="search-box">
    <input type="text" [(ngModel)]="query" placeholder="Procurar filmes..." >

    <button (click)="searchMovies()" class="search-button" mat-raised-button>
      <span class="spinner" *ngIf="isLoadingSearch">
        <mat-spinner></mat-spinner>
      </span>
      <span *ngIf="!isLoadingSearch">Buscar</span>
    </button>

  </div>

  <div class="movies">
    <mat-card class="movie-card" *ngFor="let movie of movies">

      <img *ngIf="movie.posterUrl" [src]="movie.posterUrl" [alt]="movie.title">

      <mat-card-content>
        <h2>{{ movie.title }}</h2>
        <p>{{ movie.releaseDate }}</p>
        <p>{{ movie.overview }}</p>
      </mat-card-content>

      <mat-card-actions>
        <button *ngIf="!isMovieInCollection(movie.tmdbId)" (click)="addMovie(movie)" mat-raised-button>
          Adicionar à coleção
        </button>

        <button *ngIf="isMovieInCollection(movie.tmdbId)" mat-raised-button disabled>
          Já adicionado
        </button>
      </mat-card-actions>

    </mat-card>
  </div>
</div>
